<svg xmlns="http://www.w3.org/2000/svg" width="620" height="940" viewBox="0 0 620 940" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="pipeline-title pipeline-desc">
  <title id="pipeline-title">Door-Key planning system pipeline</title>
  <desc id="pipeline-desc">A serialized MiniGrid map is converted into an augmented planning state. Known layouts use forward Dijkstra search, while the random family uses a cached reverse-Dijkstra policy. Both branches produce a minimum-cost action sequence, MiniGrid replay, GIF animation, and annotated trajectory figure.</desc>

  <style>
    :root {
      color-scheme: light dark;
      --canvas: #f8fafc;
      --surface: #ffffff;
      --border: #cbd5e1;
      --text: #0f172a;
      --muted: #475569;
      --flow: #64748b;
      --known-surface: #eff6ff;
      --known-border: #2563eb;
      --known-accent: #1d4ed8;
      --random-surface: #f5f3ff;
      --random-border: #7c3aed;
      --random-accent: #6d28d9;
      --output-surface: #ecfdf5;
      --output-border: #059669;
      --output-accent: #047857;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --canvas: #0d1117;
        --surface: #161b22;
        --border: #30363d;
        --text: #f0f6fc;
        --muted: #a5b1c2;
        --flow: #8b949e;
        --known-surface: #0c2d6b;
        --known-border: #58a6ff;
        --known-accent: #cae8ff;
        --random-surface: #3b1e69;
        --random-border: #bc8cff;
        --random-accent: #eadcff;
        --output-surface: #123c2e;
        --output-border: #3fb950;
        --output-accent: #b7f7c5;
      }
    }

    text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      text-anchor: middle;
    }

    .canvas {
      fill: var(--canvas);
      stroke: var(--border);
      stroke-width: 2;
    }

    .node {
      fill: var(--surface);
      stroke: var(--border);
      stroke-width: 2;
    }

    .known-node {
      fill: var(--known-surface);
      stroke: var(--known-border);
      stroke-width: 2;
    }

    .random-node {
      fill: var(--random-surface);
      stroke: var(--random-border);
      stroke-width: 2;
    }

    .output-node {
      fill: var(--output-surface);
      stroke: var(--output-border);
      stroke-width: 2;
    }

    .eyebrow {
      fill: var(--muted);
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 1.1px;
    }

    .known-eyebrow { fill: var(--known-accent); }
    .random-eyebrow { fill: var(--random-accent); }
    .output-eyebrow { fill: var(--output-accent); }

    .label {
      fill: var(--text);
      font-size: 26px;
      font-weight: 500;
    }

    .branch-label {
      fill: var(--text);
      font-size: 22px;
      font-weight: 500;
    }

    .detail {
      fill: var(--muted);
      font-size: 20px;
      font-weight: 400;
    }

    .flow {
      fill: none;
      stroke: var(--flow);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .junction { fill: var(--flow); }
    .arrow-head { fill: var(--flow); }
    .output-label {
      fill: var(--text);
      font-size: 24px;
      font-weight: 500;
    }
  </style>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path class="arrow-head" d="M 0 0 L 10 5 L 0 10 z"/>
    </marker>
  </defs>

  <rect class="canvas" x="1" y="1" width="618" height="938" rx="22"/>

  <path class="flow" d="M 310 106 V 136" marker-end="url(#arrow)"/>
  <path class="flow" d="M 310 236 V 276 H 158 V 306" marker-end="url(#arrow)"/>
  <path class="flow" d="M 310 276 H 463 V 306" marker-end="url(#arrow)"/>
  <path class="flow" d="M 158 442 V 482 H 310"/>
  <path class="flow" d="M 463 442 V 482 H 310"/>
  <path class="flow" d="M 310 482 V 512" marker-end="url(#arrow)"/>
  <path class="flow" d="M 310 600 V 660" marker-end="url(#arrow)"/>
  <path class="flow" d="M 310 742 V 808" marker-end="url(#arrow)"/>
  <circle class="junction" cx="310" cy="276" r="5"/>
  <circle class="junction" cx="310" cy="482" r="5"/>

  <g>
    <rect class="node" x="110" y="24" width="400" height="82" rx="14"/>
    <text class="eyebrow" x="310" y="52">01 · INPUT</text>
    <text class="label" x="310" y="84">Serialized MiniGrid Map</text>
  </g>

  <g>
    <rect class="node" x="40" y="136" width="540" height="100" rx="14"/>
    <text class="eyebrow" x="310" y="165">02 · STATE CONSTRUCTION</text>
    <text class="label" x="310" y="198">Object Scan &amp; Augmented State</text>
    <text class="detail" x="310" y="224">pose · key · goal · door status</text>
  </g>

  <g>
    <rect class="known-node" x="15" y="306" width="285" height="136" rx="14"/>
    <text class="eyebrow known-eyebrow" x="158" y="337">03A · KNOWN LAYOUTS</text>
    <text class="branch-label" x="158" y="379">Forward Dijkstra</text>
    <text class="branch-label" x="158" y="408">Search</text>
  </g>

  <g>
    <rect class="random-node" x="320" y="306" width="285" height="136" rx="14"/>
    <text class="eyebrow random-eyebrow" x="463" y="337">03B · RANDOM FAMILY</text>
    <text class="branch-label" x="463" y="379">Cached Reverse-Dijkstra</text>
    <text class="branch-label" x="463" y="408">Policy</text>
  </g>

  <g>
    <rect class="node" x="40" y="512" width="540" height="88" rx="14"/>
    <text class="eyebrow" x="310" y="541">04 · OPTIMAL PLAN</text>
    <text class="label" x="310" y="576">Minimum-Cost Action Sequence</text>
  </g>

  <g>
    <rect class="node" x="110" y="660" width="400" height="82" rx="14"/>
    <text class="eyebrow" x="310" y="688">05 · VALIDATION</text>
    <text class="label" x="310" y="721">MiniGrid Replay</text>
  </g>

  <g>
    <rect class="output-node" x="40" y="808" width="540" height="108" rx="14"/>
    <text class="eyebrow output-eyebrow" x="310" y="838">06 · OUTPUT ARTIFACTS</text>
    <text class="output-label" x="310" y="875">GIF Animation + Annotated</text>
    <text class="output-label" x="310" y="904">Trajectory Figure</text>
  </g>
</svg>
